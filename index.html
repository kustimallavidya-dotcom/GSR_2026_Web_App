<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G&SR 2026 Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="screen active">
        <div class="train-container">
            <div class="train">🚂</div>
            <div class="track"></div>
        </div>
        <h1 id="splash-text"></h1>
        <div class="credit">Created By Milind Manugade</div>
    </div>

    <!-- Login / Config Screen -->
    <div id="login-screen" class="screen glass-container hidden">
        <div class="glass-card">
            <h2>G&SR Setup</h2>
            <p>Please enter your Gemini API Key</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:none; outline:none; background:rgba(255,255,255,0.1); color:white;">
            <button id="save-key-btn" class="primary-btn">
                Save & Continue
            </button>
            <p class="small-text" style="margin-top:10px;">Your key is stored securely in your browser's local storage.</p>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen hidden">
        <header class="app-header glass-panel">
            <div class="header-top">
                <h2>G&SR 2026</h2>
                <div>
                    <span class="lang-badge">Lang: Auto</span>
                    <button id="reset-key-btn" class="icon-btn" style="font-size: 1rem; margin-left:10px;" title="Reset API Key">⚙️</button>
                </div>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Ask your question...">
                <button id="voice-btn" class="icon-btn" title="Voice Input">🎤</button>
            </div>
            <button id="ask-btn" class="primary-btn full-width">Ask Question</button>
        </header>

        <main class="chat-history" id="chat-history">
            <!-- Chat cards will appear here -->
        </main>
    </div>

    <script src="database.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
